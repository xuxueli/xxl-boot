<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="icon" href="/favicon.ico">
    <title>欢迎进入系统</title>
    <!--[if lt IE 11]>
    <script>window.location.href = '/public/ie.html';</script><![endif]-->
    <style>
        /* 全局基础样式配置 */
        html,
        body,
        #app {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        /* Chrome 框架兼容性提示样式 */
        .chromeframe {
            margin: 0.2em 0;
            background: #ccc;
            color: #000;
            padding: 0.2em 0;
        }

        /* 页面加载动画容器样式 */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999999;
        }

        /* 主加载动画圆圈样式 */
        #loader {
            display: block;
            position: relative;
            left: 50%;
            top: 50%;
            width: 150px;
            height: 150px;
            margin: -75px 0 0 -75px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #FFF;
            /* 圆圈速度-1：最外层大圈旋转周期，最显眼的主旋转    */
            -webkit-animation: spin 1s linear infinite;
            -ms-animation: spin 1s linear infinite;
            -moz-animation: spin 1s linear infinite;
            -o-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
            z-index: 1001;
        }

        /* 加载动画内层圆圈（第一层伪元素） */
        #loader:before {
            content: "";
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #FFF;
            /* 圆圈速度-2：中间层伪元素圈，旋转最慢，产生"追赶"视觉效果 */
            -webkit-animation: spin 1.5s linear infinite;
            -moz-animation: spin 1.5s linear infinite;
            -o-animation: spin 1.5s linear infinite;
            -ms-animation: spin 1.5s linear infinite;
            animation: spin 1.5s linear infinite;
        }

        /* 加载动画最内层圆圈（第二层伪元素） */
        #loader:after {
            content: "";
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #FFF;
            /* 圆圈速度-3：最内层伪元素圈，旋转最快，增加层次动感   */
            -moz-animation: spin 0.8s linear infinite;
            -o-animation: spin 0.8s linear infinite;
            -ms-animation: spin 0.8s linear infinite;
            -webkit-animation: spin 0.8s linear infinite;
            animation: spin 0.8s linear infinite;
        }

        /* WebKit 浏览器旋转动画关键帧定义 */
        @-webkit-keyframes spin {
            0% {
                -webkit-transform: rotate(0deg);
                -ms-transform: rotate(0deg);
                transform: rotate(0deg);
            }

            100% {
                -webkit-transform: rotate(360deg);
                -ms-transform: rotate(360deg);
                transform: rotate(360deg);
            }
        }

        /* 标准旋转动画关键帧定义 */
        @keyframes spin {
            0% {
                -webkit-transform: rotate(0deg);
                -ms-transform: rotate(0deg);
                transform: rotate(0deg);
            }

            100% {
                -webkit-transform: rotate(360deg);
                -ms-transform: rotate(360deg);
                transform: rotate(360deg);
            }
        }

        /* 加载遮罩层分区样式 */
        #loader-wrapper .loader-section {
            position: fixed;
            top: 0;
            width: 51%;
            height: 100%;
            /* 遮罩层背景色 */
            background: #3c8dbc;
            z-index: 1000;
            -webkit-transform: translateX(0);
            -ms-transform: translateX(0);
            transform: translateX(0);
        }

        /* 左侧遮罩分区定位 */
        #loader-wrapper .loader-section.section-left {
            left: 0;
        }

        /* 右侧遮罩分区定位 */
        #loader-wrapper .loader-section.section-right {
            right: 0;
        }

        /* 页面加载完成后左侧遮罩滑出动画 */
        .loaded #loader-wrapper .loader-section.section-left {
            -webkit-transform: translateX(-100%);
            -ms-transform: translateX(-100%);
            transform: translateX(-100%);
            /* 加载完成过渡速度-3A：左右遮罩向两侧滑出的时长，延迟0.1s让圆圈淡出后再滑开 */
            -webkit-transition: all 0.4s 0.1s cubic-bezier(0.645, 0.045, 0.355, 1.000);
            transition: all 0.4s 0.1s cubic-bezier(0.645, 0.045, 0.355, 1.000);
        }

        /* 页面加载完成后右侧遮罩滑出动画 */
        .loaded #loader-wrapper .loader-section.section-right {
            -webkit-transform: translateX(100%);
            -ms-transform: translateX(100%);
            transform: translateX(100%);
            /* 加载完成过渡速度-3B：左右遮罩向两侧滑出的时长，延迟0.1s让圆圈淡出后再滑开 */
            -webkit-transition: all 0.4s 0.1s cubic-bezier(0.645, 0.045, 0.355, 1.000);
            transition: all 0.4s 0.1s cubic-bezier(0.645, 0.045, 0.355, 1.000);
        }

        /* 页面加载完成后加载图标淡出动画 */
        .loaded #loader {
            /* 加载完成过渡速度-1：加载完成时圆圈的淡出时长 */
            opacity: 0;
            -webkit-transition: all 0.3s ease-out;
            transition: all 0.3s ease-out;
        }

        /* 页面加载完成后整个加载容器隐藏 */
        .loaded #loader-wrapper {
            visibility: hidden;
            -webkit-transform: translateY(-100%);
            -ms-transform: translateY(-100%);
            transform: translateY(-100%);
            /* 加载完成过渡速度-2：整个容器上移隐藏的时长，延迟0.5秒等遮罩滑出后再隐藏 */
            -webkit-transition: all 0.3s 0.5s ease-out;
            transition: all 0.3s 0.5s ease-out;
        }

        /* JavaScript 禁用时的降级处理 */
        .no-js #loader-wrapper {
            display: none;
        }

        /* JavaScript 禁用时的标题样式调整 */
        .no-js h1 {
            color: #222222;
        }

        /* 加载提示文字样式 */
        #loader-wrapper .load_title {
            font-family: 'Open Sans', serif;
            color: #FFF;
            font-size: 19px;
            width: 100%;
            text-align: center;
            z-index: 9999999999999;
            position: absolute;
            top: 68%;
            opacity: 1;
            line-height: 30px;
        }

        /* 加载提示文字的副标题/版本信息样式 */
        #loader-wrapper .load_title span {
            font-weight: normal;
            font-style: italic;
            font-size: 13px;
            color: #FFF;
            opacity: 0.5;
        }
    </style>
</head>

<body>
<div id="app">
    <div id="loader-wrapper">
        <div id="loader"></div>
        <div class="loader-section section-left"></div>
        <div class="loader-section section-right"></div>
        <div class="load_title">正在加载系统资源，请耐心等待 ...</div>
    </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>

</html>
